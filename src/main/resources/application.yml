spring:
  application:
    name: CatPair
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/catpair}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    show-sql: false
    properties:
      hibernate:
        format_sql: true
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 40MB

server:
  port: ${PORT:8080}

app:
  jwt:
    secret: ${JWT_SECRET:change-me-please-change-me-please-123456}
    expiration-minutes: ${JWT_EXPIRATION_MINUTES:120}
  storage:
    upload-dir: ${UPLOAD_DIR:uploads}
